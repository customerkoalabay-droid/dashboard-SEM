name: Actualizar dashboard diario

on:
  schedule:
    - cron: '58 5 * * *'  # 6:00h España invierno / 7:00h verano
  workflow_dispatch:

jobs:
  actualizar:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install gspread google-auth google-api-python-client facebook-business pandas requests

      - name: Actualizar Meta Ads
        env:
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
        run: python actualizar_meta.py

      - name: Actualizar Google Ads
        env:
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
        run: python actualizar_google_ads.py

      - name: Actualizar Shopify
        env:
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
          SHOPIFY_API_KEY: ${{ secrets.SHOPIFY_API_KEY }}
          SHOPIFY_API_SECRET: ${{ secrets.SHOPIFY_API_SECRET }}
          SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
        run: python actualizar_shopify.py

      - name: Actualizar Shopify Abandoned Carts
        env:
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
          SHOPIFY_API_KEY: ${{ secrets.SHOPIFY_API_KEY }}
          SHOPIFY_API_SECRET: ${{ secrets.SHOPIFY_API_SECRET }}
          SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
        run: python actualizar_shopify_abandoned_carts.py
      - name: Instalar dependencias
        run: |
          pip install --upgrade pip
          pip install google-analytics-data google-api-python-client google-auth
      - name: Ejecutar script
        env:
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
          GA_PROPERTY_ID: ${{ secrets.GA_PROPERTY_ID }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
        run: python extract_data_ga4.py
