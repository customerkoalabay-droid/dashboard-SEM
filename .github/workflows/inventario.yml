name: Extraccion Inventario Shopify (Independiente)

on:
  workflow_dispatch:

jobs:
  extract_inventory:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          pip install requests pandas openpyxl gspread google-auth

      - name: Ejecutar actualización de inventario
        env:
          INV_SHOPIFY_STORE: ${{ secrets.INV_SHOPIFY_STORE }}
          INV_SHOPIFY_KEY: ${{ secrets.INV_SHOPIFY_KEY }}
          INV_SHOPIFY_SECRET: ${{ secrets.INV_SHOPIFY_SECRET }}
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
        run: python actualizar_inventario.py

      - name: Subir CSV de inventario como artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: inventario-koalabay-${{ github.run_id }}
          path: inventario_total_koalabay.csv
          retention-days: 30
