name: Extraccion Inventario Shopify

on:
  workflow_dispatch: # Permite ejecución manual desde la pestaña Actions

jobs:
  extract_inventory:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          pip install requests pandas openpyxl

      - name: Ejecutar script de inventario
        env:
          SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
          SHOPIFY_API_KEY: ${{ secrets.SHOPIFY_API_KEY }}
          SHOPIFY_API_SECRET: ${{ secrets.SHOPIFY_API_SECRET }}
        run: python extract_inventory.py

      - name: Subir reporte como artefacto
        uses: actions/upload-artifact@v4 
        with:
          name: reporte-inventario-koalabay
          path: inventario_total_koalabay.csv
          retention-days: 7
