name: Extraccion Inventario Shopify (Independiente)

on:
  workflow_dispatch: 

jobs:
  extract_inventory:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          pip install requests pandas openpyxl

      - name: Ejecutar script de inventario
        env:
          # Usamos los nuevos nombres de los Secrets
          SHOPIFY_STORE: ${{ secrets.INV_SHOPIFY_STORE }}
          SHOPIFY_API_KEY: ${{ secrets.INV_SHOPIFY_TOKEN }}
          SHOPIFY_API_SECRET: ${{ secrets.INV_SHOPIFY_SECRET }}
        run: |
          SCRIPT_PATH=$(find . -name "extract_inventory.py" -print -quit)
          if [ -z "$SCRIPT_PATH" ]; then
            echo "ERROR: No se encontró el archivo."
            exit 1
          fi
          python "$SCRIPT_PATH"

      - name: Subir reporte como artefacto
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: reporte-inventario-koalabay
          path: inventario_total_koalabay.csv
          retention-days: 7
