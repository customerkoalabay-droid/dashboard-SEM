name: Extraccion Inventario Shopify (Independiente)

on:
  workflow_dispatch:

jobs:
  extract_inventory:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          pip install requests pandas openpyxl gspread google-auth

      - name: Ejecutar actualización de inventario
        env:
          SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
          SHOPIFY_API_KEY: ${{ secrets.SHOPIFY_API_KEY }}
          SHOPIFY_API_SECRET: ${{ secrets.SHOPIFY_API_SECRET }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python actualizar_inventario.py

      - name: Subir CSV de inventario como artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: inventario-koalabay-${{ github.run_id }}
          path: inventario_total_koalabay.csv
          retention-days: 30
