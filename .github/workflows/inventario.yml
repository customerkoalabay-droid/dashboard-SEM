name: Extraccion Inventario Shopify

on:
  workflow_dispatch: 

jobs:
  extract_inventory:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          pip install requests pandas openpyxl

      - name: Ejecutar script de inventario
        env:
          SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
          SHOPIFY_API_KEY: ${{ secrets.SHOPIFY_API_KEY }}
          SHOPIFY_API_SECRET: ${{ secrets.SHOPIFY_API_SECRET }}
        run: |
          # 1. Buscar el archivo ignorando si está en subcarpetas
          SCRIPT_PATH=$(find . -name "extract_inventory.py" -print -quit)
          
          # 2. Si no lo encuentra, listar todo para debug y fallar con info
          if [ -z "$SCRIPT_PATH" ]; then
            echo "--- ERROR: Archivo no encontrado ---"
            echo "Listando contenido del repositorio para depuración:"
            ls -R
            exit 1
          fi
          
          # 3. Ejecutar el script donde sea que esté
          echo "Archivo encontrado en: $SCRIPT_PATH"
          python "$SCRIPT_PATH"

      - name: Subir reporte como artefacto
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: reporte-inventario-koalabay
          path: inventario_total_koalabay.csv
          retention-days: 7
